spring.application.name=aluraforohub

spring.datasource.url=jdbc:mysql://localhost:3306/trabajoForoHub
spring.datasource.username=${MYSQL_USER:user}
spring.datasource.password=${MYSQL_PASSWORD:Raiderblue1.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

server.error.include-stacktrace=never

api.security.token.secret = ${JWT_SECRET:123456}






